<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Google for Education - Abd. Fajar Laudjeng</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f1f3f4;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background-color: white;
            width: 90%;
            max-width: 420px;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background-color: #4285F4;
        }

        .header-top {
            padding: 35px 20px 10px;
        }

        .profile-section {
            padding: 10px 20px 20px;
        }

        .greeting {
            color: #1a73e8;
            font-size: 1.4rem;
            margin: 0 0 10px 0;
            font-weight: 400;
        }

        .img-container {
            width: 160px;
            height: 160px;
            margin: 0 auto 15px;
            border-radius: 50%;
            border: 4px solid #f8f9fa;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* 'center 25%' menggeser foto ke bawah. Semakin besar angkanya, semakin turun fotonya */
            object-position: center 25%;
            /* Scale diturunkan ke 0.8 agar jarak ke tepi lebih lebar */
            transform: scale(0.8); 
            border-radius: 50%;
        }

        h1 {
            color: #202124;
            font-size: 1.6rem;
            margin: 5px 0;
            font-weight: 700;
        }

        .info-box {
            padding: 0 30px 40px;
        }

        .school {
            color: #5f6368;
            font-weight: 500;
            margin-bottom: 12px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .email {
            color: #1a73e8;
            text-decoration: none;
            font-size: 0.95rem;
            background: #f1f3f4;
            padding: 10px 20px;
            border-radius: 25px;
            display: inline-block;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .email:hover {
            background: #e8f0fe;
            border: 1px solid #d2e3fc;
            transform: translateY(-2px);
        }

        .footer-line {
            height: 6px;
            display: flex;
        }

        .f-blue { background: #4285F4; flex: 1; }
        .f-red { background: #EA4335; flex: 1; }
        .f-yellow { background: #FBBC05; flex: 1; }
        .f-green { background: #34A853; flex: 1; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-top">
            <div class="google-logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/32/Google_for_Education_logo.svg" alt="Google" width="120">
            </div>
        </div>

        <div class="profile-section">
            <p class="greeting">Hello,</p>
            <div class="img-container">
                <img src="https://lh3.googleusercontent.com/d/1j6uJv1S-2L2NMbvsV41Hi1_Pw7gwLYT6" alt="Abd. Fajar Laudjeng" class="profile-img">
            </div>
            <h1>Abd. Fajar Laudjeng</h1>
        </div>

        <div class="info-box">
            <div class="school">SMP NEGERI 10 BANAWA SELATAN</div>
            <a href="mailto:abd.fajar81@guru.smp.belajar.id" class="email">
                abd.fajar81@guru.smp.belajar.id
            </a>
        </div>

        <div class="footer-line">
            <div class="f-blue"></div>
            <div class="f-red"></div>
            <div class="f-yellow"></div>
            <div class="f-green"></div>
        </div>
    </div>

</body>
</html>
